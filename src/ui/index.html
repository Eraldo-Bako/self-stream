<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Cantarell', sans-serif; background: #1e1e1e; color: #eeeeee; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .header { margin-top: 50px; text-align: center; }
        h2 { font-weight: 300; letter-spacing: 2px; color: #3584e4; }
        
        #search { 
            width: 400px; padding: 12px 20px; border-radius: 25px; border: 2px solid #333;
            background: #2d2d2d; color: white; font-size: 1.1em; outline: none; transition: 0.3s;
            margin-bottom: 20px; text-align: center;
        }
        #search:focus { border-color: #3584e4; box-shadow: 0 0 15px rgba(53, 132, 228, 0.3); }

        #results-list { width: 450px; max-height: 500px; overflow-y: auto; padding: 10px; }
        .result-item { 
            display: flex; align-items: center; padding: 10px; background: #2a2a2a; 
            margin-bottom: 8px; border-radius: 12px; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent;
        }
        .result-item:hover { background: #333; border-color: #3584e4; transform: scale(1.02); }
        .result-poster { width: 45px; height: 65px; border-radius: 4px; margin-right: 15px; background: #444; object-fit: cover; }
        .result-info { flex-grow: 1; }
        .result-title { display: block; font-weight: bold; font-size: 0.95em; }
        .result-meta { font-size: 0.8em; color: #888; text-transform: uppercase; }

        #status { position: fixed; bottom: 20px; font-size: 0.8em; color: #666; }
        
        /* Custom Scrollbar for that Arch look */
        #results-list::-webkit-scrollbar { width: 6px; }
        #results-list::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>STREAM</h2>
        <input type="text" id="search" placeholder="Search Movie or Series..." autofocus>
    </div>
    
    <div id="results-list"></div>
    <div id="status">Ready.</div>

    <script>
        const input = document.getElementById('search');
        const resultsList = document.getElementById('results-list');
        const status = document.getElementById('status');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                status.innerText = "Searching TMDB...";
                const results = await window.api.search(input.value);
                resultsList.innerHTML = ""; 
                
                if (results.length === 0) {
                    status.innerText = "No results found.";
                    return;
                }

                results.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <img class="result-poster" src="${item.poster}" onerror="this.src='https://via.placeholder.com/45x65?text=?'">
                        <div class="result-info">
                            <span class="result-title">${item.title}</span>
                            <span class="result-meta">${item.type} • ${item.year}</span>
                        </div>
                    `;
                    div.onclick = () => {
                        status.innerText = `Launching ${item.title}...`;
                        window.api.play(item);
                    };
                    resultsList.appendChild(div);
                });
                status.innerText = "Select a version to play.";
            }
        });

        window.api.onStatus((msg) => { status.innerText = msg; });
    </script>
</body>
</html>
